<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gap Compradores - Portal Asa Norte</title>
<style>
:root{
  --primary:#333F4F;
  --secondary:#44546A;
  --light:#D9D9D9;
  --white:#FFFFFF;
}

body{
  font-family:Arial, sans-serif;
  background:var(--light);
  margin:0;
  padding:20px;
}

.header-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--primary);
  padding: 15px 20px;
  border-radius: 6px;
  color: white;
  margin-bottom: 20px;
}

.header-container h2 { margin: 0; }

.btn {
  padding: 8px 15px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}
.btn-primary { background: var(--secondary); color: white; }
.btn-primary:hover { background: #5a6f8c; }

.btn-pdf{
  background:#d32f2f;   /* vermelho */
  color:white;         /* fonte branca */
  border:none;
  padding:10px 16px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
.btn-pdf:hover{
  background:#b71c1c;  /* vermelho mais escuro */
}

.filter-box {
  background: white;
  padding: 15px;
  border-radius: 6px;
  margin-bottom: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: center;
}

.filter-group { display: flex; align-items: center; gap: 10px; }
.checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; }
.checkbox-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; }

/* Cores de status do GPS */
.status-ok { color: #2e7d32; font-weight: bold; }   /* Verde escuro */
.status-nok { color: #d32f2f; font-weight: bold; }  /* Vermelho */

/* Estrutura de Tabela para Desktop */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
th { background-color: var(--secondary); color: white; }
tr:hover { background-color: #f5f5f5; }

.loading { text-align: center; font-weight: bold; padding: 20px; color: var(--secondary); }

/* Estrutura de Cards para Mobile */
#mobile-cards-container {
  display: none;
  flex-direction: column;
  gap: 15px;
}

.mobile-card {
  background: white;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.mobile-card h3 {
  margin: 0 0 10px 0;
  color: var(--primary);
  font-size: 18px;
}

.card-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px dashed #eee;
  font-size: 14px;
}
.card-row:last-child { border-bottom: none; }

.card-grid-status {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 10px;
  background: #f9f9f9;
  padding: 8px;
  border-radius: 4px;
}

/* Media Query para alternar entre Tabela e Cards */
@media (max-width: 768px) {
  table {
    display: none !important;
  }
  .btn-pdf{
    display:none !important;
  }
  #mobile-cards-container {
    display: flex;
  }
  .header-container {
    flex-direction: column;
    gap: 12px;
    text-align: center;
  }
  .filter-box {
    flex-direction: column;
    align-items: stretch;
  }
  .checkbox-group {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<div class="header-container">
  <h2 id="titulo-setor">Compradores - Setor: ---</h2>
  <div>
    <button class="btn btn-primary" onclick="window.location.href='setor.html'">Mudar Setor</button>
    <button class="btn btn-primary" onclick="window.location.href='index.html'">Menu Principal</button>
  </div>
</div>

<div class="filter-box">
  <div class="checkbox-group">
    <label><input type="checkbox" id="cb1" onchange="filtrarDadosLocalmente()"> Ambev (=0)</label>
    <label><input type="checkbox" id="cb2" onchange="filtrarDadosLocalmente()"> MKTP (=0)</label>
    <label><input type="checkbox" id="cb3" onchange="filtrarDadosLocalmente()"> Cerveja Zero (=0)</label>
    <label><input type="checkbox" id="cb4" onchange="filtrarDadosLocalmente()"> Nab Zero (=0)</label>
    <label><input type="checkbox" id="cb5" onchange="filtrarDadosLocalmente()"> Long Neck (=0)</label>
    <label><input type="checkbox" id="cb6" onchange="filtrarDadosLocalmente()"> Guaraná Zero (=0)</label>
  </div>

  <div class="filter-group">
    <label for="slicer-dia"><b>Dia de Visita:</b></label>
    <select id="slicer-dia" onchange="filtrarDadosLocalmente()">
      <option value="Todos">Todos</option>
      <option value="2-Seg">2-Seg</option>
      <option value="3-Ter">3-Ter</option>
      <option value="4-Qua">4-Qua</option>
      <option value="5-Qui">5-Qui</option>
      <option value="6-Sex">6-Sex</option>
      <option value="7-Sab">7-Sab</option>
      <option value="1-Dom">1-Dom</option>
    </select>
  </div>

  <button class="btn" style="background:#888; color:white;" onclick="limparFiltros()">Limpar Filtros</button>
  <button class="btn-pdf" onclick="exportarPDF()">📄 Exportar p/ PDF</button>
</div>

<div id="loading" class="loading">Carregando dados do Supabase...</div>

<table id="tabela-compradores" style="display:none;">
  <thead>
    <tr>
      <th>PDV</th>
      <th>Nome</th>
      <th>RN</th>
      <th>Visita</th>
      <th>GPS</th>
      <th>Ambev</th>
      <th>MKTP</th>
      <th>Cerveja Zero</th>
      <th>Nab Zero</th>
      <th>Long Neck</th>
      <th>Guaraná Zero</th>
    </tr>
  </thead>
  <tbody id="dados-tabela">
  </tbody>
</table>

<div id="mobile-cards-container"></div>

<script>
const SUPABASE_URL = "https://nzpquivtrvqwtsiooodr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cHF1aXZ0cnZxd3RzaW9vb2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3MTc2MDYsImV4cCI6MjA4MzI5MzYwNn0.xkoPm1W0-IFDYCoVgq2PFhXJ9Bg8oP9j9Eht7yIJzcM";

let dadosOriginais = []; 
const setorAlvo = localStorage.getItem("setor_filtro");

window.onload = function() {
  if(!setorAlvo) {
    alert("Nenhum setor selecionado!");
    window.location.href = "setor.html";
    return;
  }
  document.getElementById("titulo-setor").innerText = `Compradores - Setor: ${setorAlvo}`;
  buscarDadosSupabase();
}

async function buscarDadosSupabase() {
  const url = `${SUPABASE_URL}/rest/v1/compradores?RN=eq.${encodeURIComponent(setorAlvo)}`;
  
  try {
    const r = await fetch(url, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });
    
    dadosOriginais = await r.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("tabela-compradores").style.display = "table"; 
    
    filtrarDadosLocalmente();
    
  } catch(e) {
    console.error(e);
    document.getElementById("loading").innerText = "Erro ao carregar dados do servidor.";
  }
}

function formatarStatus(valor) {
  const num = Number(valor);
  return num === 1 ? "✅" : "❌";
}

function formatarGPS(valor) {
  const num = Number(valor);
  return num === 1 ? `<span class="status-ok">OK</span>` : `<span class="status-nok">NOK</span>`;
}
  
function filtrarDadosLocalmente() {
  const cb1 = document.getElementById("cb1").checked; 
  const cb2 = document.getElementById("cb2").checked; 
  const cb3 = document.getElementById("cb3").checked; 
  const cb4 = document.getElementById("cb4").checked; 
  const cb5 = document.getElementById("cb5").checked; 
  const cb6 = document.getElementById("cb6").checked; 
  const diaSelecionado = document.getElementById("slicer-dia").value;

  const tbody = document.getElementById("dados-tabela");
  const mobileContainer = document.getElementById("mobile-cards-container");
  
  tbody.innerHTML = ""; 
  mobileContainer.innerHTML = "";

  const dadosFiltrados = dadosOriginais.filter(item => {
    if (cb1 && Number(item.cp_ambev) !== 0) return false;
    if (cb2 && Number(item.cp_mktp) !== 0) return false;
    if (cb3 && Number(item.cp_cervzero) !== 0) return false;
    if (cb4 && Number(item.cp_nabzero) !== 0) return false;
    if (cb5 && Number(item.cp_ln) !== 0) return false;
    if (cb6 && Number(item.cp_gcazero) !== 0) return false;
    if (diaSelecionado !== "Todos" && item.Visita !== diaSelecionado) return false;
    return true;
  });

  if(dadosFiltrados.length === 0) {
    const mensagemSemRegistro = `<tr><td colspan="11" style="text-align:center;">Nenhum registro encontrado com os filtros atuais.</td></tr>`;
    tbody.innerHTML = mensagemSemRegistro;
    mobileContainer.innerHTML = `<div style="text-align:center; padding:20px; font-weight:bold; color:#666;">Nenhum registro encontrado.</div>`;
    return;
  }

  dadosFiltrados.forEach(item => {
    // 1. Tabela Desktop
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.PDV || ''}</td>
      <td>${item.Nome || ''}</td>
      <td>${item.RN || ''}</td>
      <td>${item.Visita || ''}</td>
      <td>${formatarGPS(item.gps)}</td>
      <td>${formatarStatus(item.cp_ambev)}</td>
      <td>${formatarStatus(item.cp_mktp)}</td>
      <td>${formatarStatus(item.cp_cervzero)}</td>
      <td>${formatarStatus(item.cp_nabzero)}</td>
      <td>${formatarStatus(item.cp_ln)}</td>
      <td>${formatarStatus(item.cp_gcazero)}</td>
    `;
    tbody.appendChild(tr);

    // 2. Cards Mobile
    const card = document.createElement("div");
    card.className = "mobile-card";
    card.innerHTML = `
      <h3>${item.Nome || 'Sem Nome'}</h3>
      <div class="card-row"><strong>PDV:</strong> <span>${item.PDV || ''}</span></div>
      <div class="card-row"><strong>RN:</strong> <span>${item.RN || ''}</span></div>
      <div class="card-row"><strong>Visita:</strong> <span>${item.Visita || ''}</span></div>
      <div class="card-row"><strong>GPS:</strong> <span>${formatarGPS(item.gps)}</span></div>
      <div class="card-grid-status">
        <div><b>Ambev:</b> ${formatarStatus(item.cp_ambev)}</div>
        <div><b>MKTP:</b> ${formatarStatus(item.cp_mktp)}</div>
        <div><b>Cerv. Zero:</b> ${formatarStatus(item.cp_cervzero)}</div>
        <div><b>Nab Zero:</b> ${formatarStatus(item.cp_nabzero)}</div>
        <div><b>Long Neck:</b> ${formatarStatus(item.cp_ln)}</div>
        <div><b>Guará. Zero:</b> ${formatarStatus(item.cp_gcazero)}</div>
      </div>
    `;
    mobileContainer.appendChild(card);
  });
}

function exportarPDF(){
  const tabela = document.getElementById("tabela-compradores");
  const nomeArquivo = `Gap_Compradores_${setorAlvo || 'Geral'}.pdf`;

  html2pdf().set({
    margin: 10,
    filename: nomeArquivo,
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { orientation: 'landscape', unit: 'mm', format: 'a4' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  }).from(tabela).save();
}
  
function limparFiltros() {
  document.getElementById("cb1").checked = false;
  document.getElementById("cb2").checked = false;
  document.getElementById("cb3").checked = false;
  document.getElementById("cb4").checked = false;
  document.getElementById("cb5").checked = false;
  document.getElementById("cb6").checked = false;
  document.getElementById("slicer-dia").value = "Todos";
  filtrarDadosLocalmente();
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
</body>
</html>
