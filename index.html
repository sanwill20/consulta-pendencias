<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Asa Norte</title>
<style>
:root{
  --primary:#333F4F;
  --secondary:#44546A;
  --light:#D9D9D9;
  --black:#000000;
  --white:#FFFFFF;
}  
  
body{
  font-family:Arial;
  background:#D9D9D9;
  text-align:center;
  padding:40px;
}
  
.topbar{
  display:flex;
  align-items:center;
  background:var(--primary);
  padding:10px 14px;
  border-radius:6px;
  margin-bottom:12px;
}

.topbar .title{
  color:var(--white);
  font-size:24px;
  font-weight:bold;
}

.logo{
  height:48px;
  margin-right:10px;
}
  
.card{
  display:inline-block;
  background:white;
  padding:30px;
  margin:15px;
  border-radius:8px;
  text-decoration:none;
  color:var(--primay);
  width:220px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
  
.card:hover{
  transform:scale(1.03);
}
</style>
</head>
<body>

  <div class="topbar">
    <img src="logo.png" class="logo">
    <span class="title">Portal - Grupo Asa Norte</span>
  </div>

<a class="card" href="task.html">📋 Consulta Task</a>
<a class="card" href="login.html">💰 Remuneração</a>

</body>
</html>
