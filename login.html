<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Portal Asa Norte</title>

<style>
:root{
  --primary:#333F4F;
  --secondary:#44546A;
  --light:#D9D9D9;
  --white:#FFFFFF;
  --danger:#d32f2f;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--light);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:var(--primary);
  padding:30px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  width:320px;
  text-align:center;
}

.logo{
  height:60px;
  margin-bottom:10px;
}

h2{
  margin-bottom:20px;
  color:var(--white);
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:4px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:4px;
  background:var(--secondary);
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:var(--primary);
}

.msg{
  margin-top:12px;
  font-weight:bold;
  color:var(--danger);
}
</style>
</head>
<body>

<div class="login-box">
  <img src="logo.png" class="logo">
  <h2>Portal Asa Norte</h2>

  <input type="text" id="cpf" placeholder="Digite seu CPF">
  <input type="password" id="senha" placeholder="Digite sua senha">

  <button onclick="logar()">Entrar</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://nzpquivtrvqwtsiooodr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cHF1aXZ0cnZxd3RzaW9vb2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3MTc2MDYsImV4cCI6MjA4MzI5MzYwNn0.xkoPm1W0-IFDYCoVgq2PFhXJ9Bg8oP9j9Eht7yIJzcM";

async function logar(){
  msg.innerText = "Validando...";

  const cpfLimpo = cpf.value.replace(/\D/g,'');

  const url = `${SUPABASE_URL}/rest/v1/usuarios?CPF=eq.${cpfLimpo}&Senha=eq.${encodeURIComponent(senha.value)}`;

  try{
    const r = await fetch(url,{
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });

    const d = await r.json();

    if(d.length > 0){

      localStorage.setItem("cpf", d[0].CPF);
      localStorage.setItem("perfil", d[0].Perfil);
      localStorage.setItem("cod", d[0].Cod);
      localStorage.setItem("nome", d[0].Nome);

      window.location.href = "volume_ips.html";

    }else{
      msg.innerText = "CPF ou senha inválidos";
    }

  }catch(e){
    console.error(e);
    msg.innerText = "Erro ao conectar";
  }
}
</script>

</body>
</html>
