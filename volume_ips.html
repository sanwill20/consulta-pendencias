<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volume IPS</title>

<style>
:root{
  --primary:#333F4F;
  --secondary:#44546A;
  --light:#D9D9D9;
  --white:#FFFFFF;
}

body{
  font-family:Arial;
  margin:20px;
  background:var(--light);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--primary);
  color:white;
  padding:10px 15px;
  border-radius:6px;
  margin-bottom:15px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  background:var(--secondary);
  color:white;
}

.filtro-admin{
  margin-bottom:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select,input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:4px;
}

.zoom-controls{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.zoom-controls button{
  padding:6px 10px;
}

.tabela-wrap{
  overflow:auto;
  width:100%;
  -webkit-overflow-scrolling: touch;
  background:white;
}

#zoomWrap{
  width:max-content;
}

table{
  min-width:1400px;
  border-collapse:collapse;
  width:100%;
  background:white;
  font-size:13px;
}

th,td{
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  white-space:nowrap;
}

th{
  background:var(--primary);
  color:white;
}

.grupo{
  background:#44546A;
  color:white;
}

.negativo{
  color:red;
  font-weight:bold;
}

.positivo{
  color:green;
  font-weight:bold;
}

/* primeira coluna */
.fix1{
  position:sticky;
  left:0;
  width:70px;
  min-width:70px;
  max-width:70px;
  background:white;
  z-index:2;
}

/* segunda coluna */
.fix2{
  position:sticky;
  left:70px;
  background:white;
  z-index:2;
}

/* cabeçalho */
th.fix1, th.fix2{
  background:var(--primary);
  color:white;
  z-index:3;
}
</style>
</head>
<body>

<div class="topbar">
  <div><b id="boasvindas"></b></div>
  <button onclick="logout()">Sair</button>
</div>

<div class="filtro-admin">
  <select id="filtroEquipe" onchange="buscar()">
    <option value="">Todas equipes</option>
    <option value="TE_1">TE_1</option>
    <option value="TE_2">TE_2</option>
    <option value="TE_3">TE_3</option>
    <option value="TE_4">TE_4</option>
    <option value="TE_5">TE_5</option>
    <option value="SR_1">SR_1</option>
    <option value="BJ_1">BJ_1</option>
    <option value="CM_1">CM_1</option>
    <option value="CM_2">CM_2</option>
    <option value="PN_3">PN_3</option>
    <option value="PN_4">PN_4</option>
  </select>

  <input type="text" id="filtroCod" placeholder="Filtrar por Cod" onkeyup="buscar()">
</div>

<div class="zoom-controls">
  <button onclick="alterarZoom(-10)">➖</button>
  <span id="zoomLabel">70%</span>
  <button onclick="alterarZoom(10)">➕</button>
</div>

<div class="tabela-wrap">
  <div id="zoomWrap">
    <div id="tabela"></div>
  </div>
</div>

<script>
const SUPABASE_URL="https://nzpquivtrvqwtsiooodr.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cHF1aXZ0cnZxd3RzaW9vb2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3MTc2MDYsImV4cCI6MjA4MzI5MzYwNn0.xkoPm1W0-IFDYCoVgq2PFhXJ9Bg8oP9j9Eht7yIJzcM";

let zoomAtual = window.innerWidth <= 768 ? 70 : 100;

const perfil = localStorage.getItem("perfil");
const nome = localStorage.getItem("nome");

if(!perfil){
  window.location.href="login.html";
}

document.getElementById("boasvindas").innerText = `Olá, ${nome}`;

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

function cor(v){
  return Number(v) < 0 ? "negativo" : "positivo";
}

function aplicarZoom(){
  const wrap = document.getElementById("zoomWrap");
  wrap.style.zoom = `${zoomAtual}%`;
  wrap.style.width = "max-content";
  document.getElementById("zoomLabel").innerText = zoomAtual + "%";
}

function alterarZoom(valor){
  zoomAtual += valor;

  if(zoomAtual < 40) zoomAtual = 40;
  if(zoomAtual > 100) zoomAtual = 100;

  aplicarZoom();
}

async function buscar(){

  let url = `${SUPABASE_URL}/rest/v1/volume_ips`;

  const filtroEquipe = document.getElementById("filtroEquipe").value;
  const filtroCod = document.getElementById("filtroCod").value;

  let filtros = [];

  if(filtroEquipe){
    filtros.push(`GV=eq.${filtroEquipe}`);
  }

  if(filtroCod){
    filtros.push(`Cod=ilike.*${filtroCod}*`);
  }

  if(filtros.length > 0){
    url += "?" + filtros.join("&");
  }

  const r = await fetch(url,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  });

  const d = await r.json();

  let h = `<table>
    <tr class="grupo">
      <th rowspan="2" class="fix1">Cod</th>
      <th rowspan="2" class="fix2">Nome</th>
      <th colspan="5">Cerveja TT</th>
      <th colspan="5">Nab TT</th>
      <th colspan="5">MKTP</th>
      <th colspan="4">Task</th>
    </tr>

    <tr>
      <th>Meta</th><th>Real</th><th>Tend</th><th>%Tend</th><th>Gap</th>
      <th>Meta</th><th>Real</th><th>Tend</th><th>%Tend</th><th>Gap</th>
      <th>Meta</th><th>Real</th><th>Tend</th><th>%Tend</th><th>Gap</th>
      <th>Meta</th><th>Real</th><th>Ating</th><th>Gap</th>
    </tr>`;

  d.forEach(r=>{
    h += `<tr>
      <td class="fix1">${r.Cod ?? ""}</td>
      <td class="fix2">${r.Nome ?? ""}</td>

      <td>${r.meta_cerveja ?? ""}</td>
      <td>${r.real_cerveja ?? ""}</td>
      <td>${r.tend_cerveja ?? ""}</td>
      <td>${r.ptend_cerveja ?? ""}</td>
      <td class="${cor(r.gap_cerveja)}">${r.gap_cerveja ?? ""}</td>

      <td>${r.meta_nab ?? ""}</td>
      <td>${r.real_nab ?? ""}</td>
      <td>${r.tend_nab ?? ""}</td>
      <td>${r.ptend_nab ?? ""}</td>
      <td class="${cor(r.gap_nab)}">${r.gap_nab ?? ""}</td>

      <td>${r.meta_mktp ?? ""}</td>
      <td>${r.real_mktp ?? ""}</td>
      <td>${r.tend_mktp ?? ""}</td>
      <td>${r.ptend_mktp ?? ""}</td>
      <td class="${cor(r.gap_mktp)}">${r.gap_mktp ?? ""}</td>

      <td>${r.meta_task ?? ""}</td>
      <td>${r.real_task ?? ""}</td>
      <td>${r.ating_task ?? ""}</td>
      <td class="${cor(r.gap_task)}">${r.gap_task ?? ""}</td>
    </tr>`;
  });

  h += "</table>";
  document.getElementById("tabela").innerHTML = h;

  setTimeout(aplicarZoom,100);
}

buscar();
aplicarZoom();
</script>

</body>
</html>
