<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asa Norte - Consulta de Task</title>

<style>
:root{
  --primary:#333F4F;
  --secondary:#44546A;
  --light:#D9D9D9;
  --black:#000000;
  --white:#FFFFFF;
}
  
.btn-pdf{
  background:#d32f2f;   /* vermelho */
  color:white;         /* fonte branca */
  border:none;
  padding:10px 16px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin-left:10px;
}

.highlight{
  background:yellow;
  color:black;
  font-weight:bold;
}
  
.btn-pdf:hover{
  background:#b71c1c;  /* vermelho mais escuro */
}
  
body{
  font-family:Arial;
  margin:20px;
  background:var(--light);
  color:var(--black);
}

.topbar{
  display:flex;
  align-items:center;
  background:var(--primary);
  padding:10px 14px;
  border-radius:6px;
  margin-bottom:12px;
}

.topbar .title{
  color:var(--white);
  font-size:18px;
  font-weight:bold;
}

.logo{
  height:36px;
  margin-right:10px;
}


label{
  font-weight:bold;
  margin-top:6px;
  display:block;
  color:var(--primary);
}

select,input{
  padding:6px;
  margin-top:2px;
  min-width:200px;
  border:1px solid var(--secondary);
  border-radius:4px;
  background:var(--white);
}

button{
  padding:8px 16px;
  margin-top:10px;
  cursor:pointer;
  background:var(--secondary);
  color:var(--white);
  border:none;
  border-radius:4px;
  transition:.2s;
}

button:hover{
  background:var(--primary);
}

.toggle{
  float:right;
  margin-top:4px;
  margin-bottom:12px;
  background:var(--primary);
}

table{
  border-collapse:collapse;
  margin-top:12px;
  font-size:13px;
  width:100%;
  background:var(--white);
}

th,td{
  border:1px solid var(--light);
  padding:6px 8px;
}

th{
  background:var(--primary);
  color:var(--white);
}

tr:nth-child(even){
  background:#f7f7f7;
}

.check{color:green;font-weight:bold}
.cross{color:red;font-weight:bold}

.message{
  margin-top:8px;
  font-weight:bold;
}

.success{color:green}
.warning{color:#b45309}
.error{color:red}

.filters{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:flex-end;
  background:var(--white);
  padding:12px;
  border-radius:6px;
  border:1px solid var(--light);
}

.filter{
  display:flex;
  flex-direction:column;
}

.compact body{margin:10px}
.compact .filters{flex-direction:column}
.compact table{font-size:11px}
.compact th,.compact td{padding:4px}
.compact h2{text-align:center}
.compact button{width:100%}


/* cartões mobile */
.cards{
  display:none;
}

.card{
  background:white;
  border-radius:8px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  font-size:13px;
}

.card b{
  color:#333F4F;
}

/* botão fixo no mobile */
.mobile-bar{
  display:none;
}

.desktop-only{
  display:inline-block;
}
  
@media (max-width: 768px){

  .desktop-only{
    display:none !important;
  }
  
  .btn-pdf{
    display:none !important;
  }
  
  table{
    display:none;
  }

  .cards{
    display:block;
    margin-top:10px;
  }

  .mobile-bar{
    display:flex;
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    padding:10px;
    border-top:1px solid #ccc;
    z-index:100;
  }

  .mobile-bar button{
    width:100%;
    font-size:16px;
    padding:12px;
  }

  body{
    padding-bottom:70px;
  }

}
  
</style>

</head>
<body>
  
  <div class="topbar">
    <img src="logo.png" class="logo">
    <span class="title">Asa Norte - Consulta de Task</span>
  </div>
  
  <label >⏰ Atualização: <span id="atualizacao"></span></label>
        
  <div class="filters no-pdf">
    <div class="filter">
      <label>🏢 Operação</label>
      <select id="operacao">
        <option>Asa Bom Jesus</option>
        <option>Asa Norte Campo Maior</option>
        <option>Asa Norte Parnaiba</option>
        <option>Asa São Raimundo</option>
        <option>Asa Norte Teresina</option>
      </select>
    </div>
  
    <div class="filter">
      <label>📅 Visita</label>
      <select id="visita">
        <option value="">Todos</option>
        <option>Seg</option>
        <option>Ter</option>
        <option>Qua</option>
        <option>Qui</option>
        <option>Sex</option>
        <option>Sáb</option>
      </select>
    </div>
  
    <div class="filter">
      <label>🥇 RN</label>
      <input id="setor" maxlength="3" placeholder="000">
    </div>
  
    <div class="filter">
      <label>📃 Cluster Primário</label>
      <select id="cluster_pri">
        <option value="">Todos</option>
        <option>Desenvolvimento de Portfólio</option>
        <option>Digitalização BEES</option>
        <option>Marketplace</option>
        <option>Volume</option>
        <option>Execução</option>
        <option>Nível de Serviço</option>
      </select>
    </div>
  
    <div class="filter">
      <label>📃 Cluster Secundário</label>
      <select id="cluster_sec">
        <option value="">Todos</option>
        <option>B2O</option>
        <option>Combo</option>
        <option>SKU/PDV</option>
        <option>Categoria</option>
        <option>INPUT_MANUAL</option>
        <option>Estabilização</option>
        <option>Clube B</option>
        <option>Incremento</option>
        <option>Faixa</option>
        <option>Geladeira</option>
        <option>Mapeamento de loja</option>
        <option>TTC</option>
        <option>Adoção</option>
        <option>Materiais</option>
        <option>Atendimento</option>
        <option>Cardápio</option>
        <option>Devolução</option>
        <option>Cartazete</option>
        <option>Ponto Extra</option>
        <option>Campanhas Digitais</option>
        <option>Reversão</option>
        <option>Scanntech & Mercafácil</option>
        <option>Cadastro</option>
        <option>Gôndola</option>
      </select>
    </div>
  
    <div class="filter">
      <label>💼 Categoria</label>
      <select id="categoria">
        <option value="">Todos</option>
        <option>BEER</option>
        <option>NAB</option>
        <option>MATCH</option>
        <option>MKTPLACE</option>
        <option>CRAFT</option>
      </select>
    </div>
  
    <div class="filter">
      <label>✔ Valid</label>
      <select id="filtro_valid">
        <option value="">Todos</option>
        <option value="1">Somente ✅</option>
        <option value="0">Somente ❌</option>
      </select>
    </div>
  
    <div class="filter">
      <label>📦 SKU Foco</label>
      <select id="sku_foco">
        <option value="">Todos</option>
        <option>Sim</option>
        <option>Não</option>
      </select>
    </div>
    
    <div class="filter">
      <label>⭐ Score 5</label>
      <select id="score5">
        <option value="">Todos</option>
        <option>Sim</option>
        <option>Não</option>
      </select>
    </div>

    <div class="filter">
      <label>🍺 Cerveja Zero</label>
      <select id="cerv0">
        <option value="">Todos</option>
        <option>-</option>
        <option>CERV_2 - Zero Alcool</option>
      </select>
    </div>
    
    <div class="filter">
      <label>🏪 PDV</label>
      <input id="pdv" maxlength="5" placeholder="00000">
    </div>

    <div class="filter">
      <label>🔎 Buscar na Task</label>
      <input id="task_search" placeholder="Ex: Stella">
    </div>

    <div class="filter">
      <label>📉 Gap mínimo</label>
      <input id="gap" type="text" inputmode="decimal" placeholder="Ex: -5">
    </div>
    
    <button class="btn-pdf" onclick="exportarPDF()">
    📄 Exportar p/ PDF
    </button>
    
  </div>
  
  <button class="no-pdf desktop-only" onclick="buscar()">🔍 Buscar</button>
  <button class="no-pdf desktop-only" onclick="limpar()">🧹 Limpar filtros</button>
  
  <div class="mobile-bar no-pdf">
    <button onclick="buscar()">🔍 Buscar</button>
    <button onclick="limpar()">🧹 Limpar filtros</button>
  </div>
  
<div id="area-pdf">    
  <div class="message no-pdf" id="mensagem"></div>
  <div id="tabela"></div>
  <div class="cards" id="cards"></div>
</div>

<script>
const SUPABASE_URL="https://nzpquivtrvqwtsiooodr.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cHF1aXZ0cnZxd3RzaW9vb2RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3MTc2MDYsImV4cCI6MjA4MzI5MzYwNn0.xkoPm1W0-IFDYCoVgq2PFhXJ9Bg8oP9j9Eht7yIJzcM";

function toggleLayout(){
 document.documentElement.classList.toggle("compact");
}

function highlightTask(text){
  if(!task_search.value) return text;

  const v = task_search.value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const r = new RegExp(`(${v})`, "gi");

  return text.replace(r, `<span class="highlight">$1</span>`);
}
  
async function buscar(){
  const params=[];

  if(operacao.value) params.push(`Operacao=eq.${encodeURIComponent(operacao.value)}`);
  if(visita.value) params.push(`Visita=eq.${encodeURIComponent(visita.value)}`);
  if(setor.value) params.push(`Setor=eq.${setor.value}`);
  if(cluster_pri.value) params.push(`Cluster_Pri=eq.${encodeURIComponent(cluster_pri.value)}`);
  if(cluster_sec.value) params.push(`Cluster_Sec=eq.${encodeURIComponent(cluster_sec.value)}`);
  if(categoria.value) params.push(`Categoria=eq.${encodeURIComponent(categoria.value)}`);
  if(filtro_valid.value!=="") params.push(filtro_valid.value==="1" ? "Valid=gt.0" : "Valid=eq.0");
  if(sku_foco.value) params.push(`SKU_Foco=eq.${encodeURIComponent(sku_foco.value)}`);
  if(score5.value) params.push(`S5=eq.${encodeURIComponent(score5.value)}`);
  if(cerv0.value) params.push(`Cesta=eq.${encodeURIComponent(cerv0.value)}`);
  if(pdv.value) params.push(`Pdv=eq.${encodeURIComponent(pdv.value)}`);

  if(task_search.value){
    params.push(`Task=ilike.*${encodeURIComponent(task_search.value)}*`);
  }

  if(gap.value !== ""){
   const valorGap = parseFloat(gap.value.replace(",", "."));
   params.push(`Gap=gte.${valorGap}`);
  }

  const url = `${SUPABASE_URL}/rest/v1/pendencias?select=Visita,Pdv,Nome,Cluster_Pri,Cluster_Sec,Categoria,Meta,Real,Gap,Task,Valid&${params.join("&")}`;

  mensagem.textContent="Carregando...";
  mensagem.className="message";
  tabela.innerHTML="";

  try{
    const r = await fetch(url, {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });

    const d = await r.json();

    if(!Array.isArray(d) || !d.length){
      mensagem.textContent="Nenhum registro encontrado.";
      mensagem.className="message warning";
      return;
    }

    mensagem.textContent = `${d.length} registro(s).`;
    mensagem.className = "message success";

    let h = `<table>
      <thead>
        <tr>
          <th>Visita</th><th>PDV</th><th>Nome</th>
          <th>Cluster Pri</th><th>Cluster Sec</th>
          <th>Categoria</th><th>Meta</th><th>Real</th><th>Gap</th>
          <th>Task</th><th>Valid</th>
        </tr>
      </thead>
      <tbody>`;

    let c = "";

    d.forEach(r=>{
      h += `<tr>
        <td>${r.Visita||""}</td>
        <td>${r.Pdv||""}</td>
        <td>${r.Nome||""}</td>
        <td>${r.Cluster_Pri||""}</td>
        <td>${r.Cluster_Sec||""}</td>
        <td>${r.Categoria||""}</td>
        <td>${r.Meta||""}</td>
        <td>${r.Real||""}</td>
        <td>${r.Gap||""}</td>
        <td>${highlightTask(r.Task||"")}</td>
        <td>${r.Valid>0 ? '✅' : '❌'}</td>
      </tr>`;

      c += `<div class="card">
        <div><b>PDV:</b> ${r.Pdv||""} — ${r.Nome||""}</div>
        <div><b>Visita:</b> ${r.Visita||""}</div>
        <div><b>Cluster:</b> ${r.Cluster_Pri||""} / ${r.Cluster_Sec||""}</div>
        <div><b>Categoria:</b> ${r.Categoria||""}</div>
        <div><b>Meta:</b> ${r.Meta||""} — <b>Real:</b> ${r.Real||""} — <b>Gap:</b> ${r.Gap||""}</div>
        <div><b>Task:</b> ${highlightTask(r.Task||"")}</div>
        <div><b>Valid:</b> ${r.Valid>0 ? '✅' : '❌'}</div>
      </div>`;
      
    });

    tabela.innerHTML = h + "</tbody></table>";
    cards.innerHTML = c;

  }catch(e){
    console.error(e);
    mensagem.textContent="Erro ao consultar os dados.";
    mensagem.className="message error";
  }
}

function limpar(){
 document.querySelectorAll("input,select").forEach(e=>e.value="");
 document.querySelectorAll("input[type=checkbox]").forEach(e=>e.checked=false);
 tabela.innerHTML="";mensagem.textContent="";
  cards.innerHTML="";mensagem.textContent="";
}

async function carregarAtualizacao(){
  const url = `${SUPABASE_URL}/rest/v1/pendencias?select=Atualizacao&order=Atualizacao.desc&limit=1`;

  try{
    const r = await fetch(url, {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });

    const d = await r.json();

    if(d.length){
      // vem como string e fica como string
      atualizacao.textContent = d[0].Atualizacao;
    }else{
      atualizacao.textContent = "não encontrada";
    }

  }catch(e){
    atualizacao.textContent = "erro ao carregar";
  }
}

function exportarPDF(){
  const area = document.getElementById("area-pdf");

  html2pdf().set({
    margin: 8,
    filename: 'Consulta_Task.pdf',
    html2canvas: { scale: 2 },
    jsPDF: { orientation: 'landscape' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
    ignoreElements: el => el.classList.contains("no-pdf")
  }).from(area).save();
}

  
const operacao=document.getElementById("operacao"),
visita=document.getElementById("visita"),
setor=document.getElementById("setor"),
cluster_pri=document.getElementById("cluster_pri"),
cluster_sec=document.getElementById("cluster_sec"),
categoria=document.getElementById("categoria"),
filtro_valid=document.getElementById("filtro_valid"),
sku_foco=document.getElementById("sku_foco"),
score5=document.getElementById("score5"),
cerv0=document.getElementById("cerv0"),
pdv=document.getElementById("pdv"),
task_search=document.getElementById("task_search"),
gap=document.getElementById("gap"),
mensagem=document.getElementById("mensagem"),
tabela=document.getElementById("tabela"),
cards=document.getElementById("cards"),
atualizacao=document.getElementById("atualizacao");

carregarAtualizacao();

  
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</body>
</html>
